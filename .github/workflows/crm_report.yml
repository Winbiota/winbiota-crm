name: Winbiota CRM Report

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '30 7 * * *'
    - cron: '0 8 * * *'
    - cron: '30 8 * * *'
    - cron: '0 9 * * *'
    - cron: '30 9 * * *'
    - cron: '0 10 * * *'
    - cron: '30 10 * * *'
    - cron: '0 11 * * *'
    - cron: '30 11 * * *'
    - cron: '0 12 * * *'
    - cron: '30 12 * * *'
    - cron: '0 13 * * *'
    - cron: '30 13 * * *'
    - cron: '0 14 * * *'
    - cron: '30 14 * * *'
    - cron: '0 15 * * *'
    - cron: '30 15 * * *'
    - cron: '0 16 * * *'
    - cron: '30 16 * * *'
    - cron: '0 17 * * *'
    - cron: '30 17 * * *'
    - cron: '0 18 * * *'
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas openpyxl google-auth google-api-python-client
      - name: Run CRM script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python crm_script.py
